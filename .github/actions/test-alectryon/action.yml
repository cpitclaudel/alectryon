name: Build and test
description: Build Docker image and run Alectryon tests

inputs:
  python_version:
    required: true
  rocq_version:
    required: true
  ocaml_version:
    required: true
  pip_cmp:
    required: true
  cache_from:
    required: true
  cache_to:
    required: true

runs:
  using: composite
  steps:
  - name: Set environment
    shell: bash
    run: echo "ALECTRYON_DOCKER_IMAGE=alectryon.ci" >> "$GITHUB_ENV"

  - uses: docker/setup-docker-action@v5
    with:
      daemon-config: |
        { "features": { "containerd-snapshotter": true } }
  - uses: docker/setup-buildx-action@v4
    with:
      driver: docker
  - uses: docker/build-push-action@v7
    with:
      context: .
      file: deps/Dockerfile.ci
      tags: alectryon.ci
      build-args: |
        PYTHON_VERSION=${{ inputs.python_version }}
        OCAML_VERSION=${{ inputs.ocaml_version }}
        ROCQ_VERSION=${{ inputs.rocq_version }}
        PIP_CMP=${{ inputs.pip_cmp }}
      cache-from: ${{ inputs.cache_from }}
      cache-to: ${{ inputs.cache_to }}

  - name: Run tests
    shell: bash
    run: etc/docker.sh opam exec --switch=rocq -- sh etc/tests/main.sh

  - name: Run elisp tests
    shell: bash
    run: etc/docker.sh opam exec --switch=rocq -- sh etc/tests/elisp.sh

  - name: Test packaging
    shell: bash
    run: etc/docker.sh opam exec --switch=rocq -- sh etc/tests/package.sh
