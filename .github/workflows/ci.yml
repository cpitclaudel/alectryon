name: CI

on:
  push:
    branches: [main, next]
  pull_request:
  schedule:
    - cron: '0 6 * * 5'  # Every Friday at 6am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.14"]
        rocq: ["9.0.1", "9.1.0"]
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/test-alectryon
      with:
        python_version: ${{ matrix.python }}
        rocq_version: ${{ matrix.rocq }}
        ocaml_version: "5.4.0"
        pip_constraint: "<="
        cache_from: "type=gha,scope=py${{ matrix.python }}-rocq${{ matrix.rocq }}"
        cache_to: "type=gha,mode=max,scope=py${{ matrix.python }}-rocq${{ matrix.rocq }}"

  test-dev:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/test-alectryon
      with:
        python_version: "3.14"
        rocq_version: dev
        ocaml_version: "5.4.0"
        pip_constraint: ">="
        cache_from: ""
        cache_to: ""
