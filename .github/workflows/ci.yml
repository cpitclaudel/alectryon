name: CI

on:
  push:
    branches: [main, next]
  pull_request:
  schedule:
    - cron: '0 6 * * 5'  # Every Friday at 6am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OCAML_VERSION: "5.4.0"
  ALECTRYON_DOCKER_IMAGE: alectryon.ci

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.14"]
        rocq: ["9.0.1", "9.1.0"]
        pip_constraint: ["<="]
        cache_from: ["type=gha"]
        cache_to: ["type=gha,mode=max"]
        include:
          - python: "3.14"
            rocq: dev
            pip_constraint: ">="
            cache_from: ""
            cache_to: ""
    continue-on-error: ${{ matrix.rocq == 'dev' }}
    steps:
    - uses: actions/checkout@v6
    - uses: docker/setup-docker-action@v5
      with:
        daemon-config: |
          { "features": { "containerd-snapshotter": true } }
    - uses: docker/setup-buildx-action@v4
      with:
        driver: docker
    - uses: docker/build-push-action@v7
      with:
        context: .
        file: deps/Dockerfile.ci
        tags: alectryon.ci
        build-args: |
          PYTHON_VERSION=${{ matrix.python }}
          OCAML_VERSION=${{ env.OCAML_VERSION }}
          ROCQ_VERSION=${{ matrix.rocq }}
          PIP_CONSTRAINT=${{ matrix.pip_constraint }}
        cache-from: ${{ matrix.cache_from }}
        cache-to: ${{ matrix.cache_to }}

    - name: Run tests
      run: etc/docker.sh opam exec --switch=rocq -- sh etc/tests/main.sh

    - name: Run elisp tests
      run: etc/docker.sh opam exec --switch=rocq -- sh etc/tests/elisp.sh

    - name: Test packaging
      run: etc/docker.sh opam exec --switch=rocq -- sh etc/tests/package.sh
